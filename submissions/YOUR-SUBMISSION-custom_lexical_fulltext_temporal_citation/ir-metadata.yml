schema-version: 0.1
run-version: 1.0
tag: custom_lexical_fulltext_temporal_citation
platform:
  hardware:
    cpu:
      model: Intel64 Family 6 Model 151 Stepping 2, GenuineIntel
      architecture: AMD64
      operation mode: 64-bit
      number of cores: 16
    ram: 40 GB
  operating system:
    distribution: Windows 11
    kernel: Windows-11-10.0.26200-SP0
  software:
    libraries:
      python:
      - python==3.12.7
      - numpy==2.4.4
      - pandas==2.3.3
      - pyyaml==6.0.3
      - ir_datasets==0.5.11
    retrieval toolkit:
    - pyterrier==1.0.4
research goal:
  venue:
    name: CLEF LongEval
    year: 2026
  evaluation:
    reported measures:
    - ndcg_cut_10
    - ndcg_cut_1000
    - map
    - recall_100
    - recall_1000
    baseline:
    - custom_lexical_fulltext_temporal
implementation:
  executable:
    cmd: .\.venv\Scripts\python.exe scripts/run_baseline.py --config configs/custom_lexical_fulltext_temporal_citation.yaml
  source:
    lang:
    - Python
    - YAML
    - PowerShell
    commit: b0aa52e
method:
  automatic: true
  score ties: alphabetical order on doc_id after score sorting
  indexing:
    tokenizer: Terrier tokeniser via PyTerrier
    stemmer: Porter
    stopwords: Terrier default
  retrieval:
  - name: bm25_fulltext
    method: Terrier BM25 over full text
    top_k: 1000
  - name: temporal_overlay
    method: longeval_sci.temporal.rerank.temporal_rerank_results
    reranks: bm25_fulltext
    integration mode: direct
    rerank top k: 200
    citation features: true
actor:
  name: Haijian, Wu/Yingdong Yang
  team: GLHF
  fields:
  - ir
  - nlp
  role: experimenter
data:
  test collection:
    name: CLEF LongEval-Sci 2026 snapshot test collection
    source: https://clef-longeval.github.io/tasks/
    topics: https://pypi.org/project/ir-datasets-longeval/
    ir_datasets: longeval-sci-2026/{snapshot-1,snapshot-2,snapshot-3}
  training data:
  - name: snapshot-1 train development split
    source: https://clef-longeval.github.io/tasks/
  other:
  - name: local citation network cache
    source: https://pypi.org/project/ir-datasets-longeval/
