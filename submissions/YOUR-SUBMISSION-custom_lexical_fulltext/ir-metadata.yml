tag: custom_lexical_fulltext
actor:
  team: GLHF
research goal:
  description: |
    This run targets CLEF LongEval 2026 Task 1 (LongEval-Sci).
    The system is a non-temporal lexical baseline that retrieves documents
    from the full-text snapshot index with PyTerrier/Terrier BM25.
    The goal is to provide a strong automatic baseline without temporal
    reranking or citation-aware adjustments.
platform:
  software:
    libraries:
      - python==3.12.7
      - python-terrier==1.0.4
      - ir-datasets-longeval>=0.0.12
      - numpy==2.4.4
      - pyyaml==6.0.3
implementation:
  source:
    repository: https://github.com/WiJoWill/longeval2026task1
data:
  training data:
    - name: longeval-sci
    - name: snapshot-1 train development split
method:
  automatic: true
  indexing:
    tokenizer: Terrier tokeniser via PyTerrier
    stemmer: Porter
    stopwords: Terrier default
  retrieval:
    - name: bm25_fulltext
      lexical: true
      deep_neural_model: false
      sparse_neural_model: false
      dense_neural_model: false
      single_stage_retrieval: true