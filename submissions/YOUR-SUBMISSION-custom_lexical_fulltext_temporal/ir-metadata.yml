tag: custom_lexical_fulltext_temporal
actor:
  team: GLHF
research goal:
  description: |
    This run targets CLEF LongEval 2026 Task 1 (LongEval-Sci).
    The system starts from full-text BM25 retrieval and then applies a
    temporal reranking overlay based on recency, update, foundation,
    and novelty signals derived from document metadata.
    The goal is to improve robustness under temporal collection drift
    while keeping the base retrieval model lexical.
platform:
  software:
    libraries:
      - python==3.12.7
      - python-terrier==1.0.4
      - ir-datasets-longeval>=0.0.12
      - numpy==2.4.4
      - pyyaml==6.0.3
implementation:
  source:
    repository: https://github.com/WiJoWill/longeval2026task1
data:
  training data:
    - name: longeval-sci
    - name: snapshot-1 train development split
method:
  automatic: true
  indexing:
    tokenizer: Terrier tokeniser via PyTerrier
    stemmer: Porter
    stopwords: Terrier default
  retrieval:
    - name: bm25_fulltext_with_temporal_reranking
      lexical: true
      deep_neural_model: false
      sparse_neural_model: false
      dense_neural_model: false
      single_stage_retrieval: false